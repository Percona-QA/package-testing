---
dependency:
  name: galaxy
driver:
  name: ec2
platforms:
  - name: al2023-${BUILD_NUMBER}-${BUILD_NUMBER}-${JOB_NAME}-proxysql-tarball
    region: us-west-1
    image: ami-061ad72bc140532fd
    vpc_subnet_id: subnet-04a8ad1b1d4da874c
    instance_type: t2.large
    ssh_user: ec2-user
    root_device_name: /dev/xvda
    instance_tags:
      iit-billing-tag: proxysql-binary-tarball
      job-name: ${JOB_NAME}
provisioner:
  name: ansible
  log: True
  playbooks:
    create: ../../playbooks/create.yml
    destroy: ../../playbooks/destroy.yml
    prepare: ../../playbooks/prepare.yml
    cleanup: ../../playbooks/cleanup.yml
    converge: ../../playbooks/playbook.yml
scenario:
  name: al-2023
  destroy_sequence:
    - destroy
  clenup_sequence:
    - cleanup
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy

verifier:
  name: testinfra
  directory: ../../tests/
  options:
    verbose: true
    s: true
  env:
    MOLECULE_INVENTORY_FILE: ${MOLECULE_INVENTORY_FILE}
