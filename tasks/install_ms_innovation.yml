      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when:
      - ansible_distribution == "Amazon"

  - name: "[MS-INSTALL] Install MySQL repo RPM Amazon"
    ansible.builtin.yum:
      name: /tmp/mysql80-community-release-el9-1.noarch.rpm
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: "[MS-INSTALL] Install MySQL repo RPM Amazon"
    ansible.builtin.yum:
      name: /tmp/mysql84-community-release-el9-1.noarch.rpm
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Install MySQL 8.0 community server Amazon"
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: "[MS-INSTALL] Install MySQL 8.4 community server Amazon"
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-START] Start mysqld service (RHEL 7+)"
    ansible.builtin.systemd:
      name: mysqld
      enabled: yes
      state: started
    become: yes
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-START] Start mysqld service (MS80/MS84)"
    ansible.builtin.systemd:
      name: mysqld
      enabled: yes
      state: started
    become: yes
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-START] Fetch temporary root password from log"
    shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -1
    register: init_pass
    ignore_errors: yes
    changed_when: false
    when:
      - lookup('env', 'server_to_test') != "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-START] Set root password"
    shell: |
      mysql -uroot -p'{{ init_pass.stdout }}' --connect-expired-password -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'U?fY)9s7|3gxUm'; FLUSH PRIVILEGES;"
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"
    ignore_errors: true

  - name: "[MS-START] Restart mysqld after password change"
    service:
      name: mysqld
      state: restarted
      enabled: yes
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"

  - name: "[MS-START] Debug temporary root password"
    debug:
      msg: "Fetched MySQL temporary root password is '{{ init_pass.stdout }}'"
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"

  - name: "[MS-START] Copy .my.cnf credentials (RHEL)"
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: 
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-START] Restart mysqld (RHEL)"
    command: systemctl restart mysqld
    when:
      - lookup('env', 'server_to_test') == "ms_innovation"
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")

  - name: "[MS-START] Restart mysql (Debian)"
    command: systemctl restart mysql
    when:
      - lookup('env', 'server_to_test') == "ms_innovation"
      - ansible_os_family == "Debian"
