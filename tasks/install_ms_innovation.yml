
# MS-INSTALL START

  - name: "[MS-INSTALL] Print variables"
    debug:
      msg: "VER {{ pxb_version_major }} MAJ MIN{{ pxb_version_major_minor }} "
    when: lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Print ansible_distribution_version"
    debug:
      var: ansible_distribution_version

  - name: "[MS-INSTALL] Print ansible_os_family"
    debug:
      var: ansible_os_family

  - name: "[MS-INSTALL] Install yum-utils (RHEL)"
    yum:
      name: yum-utils
      state: present
    when:
      - ansible_os_family == "RedHat"

  - name: "[MS-INSTALL] Import GPG key RPM-2023 (RHEL 7+)"
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Import GPG key RPM-2023 (Debian)"
    shell: |
      curl -fsSL https://repo.mysql.com/RPM-GPG-KEY-mysql-2023 | apt-key add -
    when:
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80"


#  - name: Import key for mysql-repo add GPG key (Debian)
#    apt_key:
#      url: http://repo.mysql.com/RPM-GPG-KEY-mysql-2023  
#      state: present
#    when: 
#      - ansible_os_family == "Debian"
#      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80"

  - name: "[MS-INSTALL] Import GPG key RPM-2022 (RHEL 8+)"
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2022
    when: 
      - ansible_os_family == "RedHat" 
      - ansible_facts['distribution_major_version'] | int >= 8
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Install MySQL repo (RHEL 8)"
    dnf: name=https://repo.mysql.com/mysql80-community-release-el8.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL repo (RHEL 9)"
    dnf: name=https://repo.mysql.com/mysql80-community-release-el9.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 9
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL repo (RHEL 10)"
    dnf: name=https://repo.mysql.com/mysql80-community-release-el10.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 10
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL repo (RHEL 9)"
    dnf: name=https://repo.mysql.com/mysql80-community-release-el9.rpm state=present
    when: 
      - ansible_os_family == "Amazon"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Setup EPEL 8 repo"
    dnf: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[DEBUG-REPOS] Check enabled repos before MS install"
    include_tasks: debug_repos.yml

  - name: "[MS-INSTALL] Download world database"
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql
    when:
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Disable mysql module (RHEL 8)"
    command: /usr/bin/dnf module disable mysql -y
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Install prerequisite deb packages"
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - vim
      - pv
      - unzip
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Download MySQL deb tarball (Ubuntu 22.04, archives)"
    command: wget https://cdn.mysql.com/archives/mysql-"{{ pxb_version_major }}"/mysql-server_"{{ pxb_version_major_minor }}"-1ubuntu22.04_amd64.deb-bundle.tar
    when: 
      - ansible_distribution == 'Ubuntu' and ansible_distribution_version == '22.04'
      - lookup('env', 'server_to_test') == "ms_innovation"
      - pxb_version_major != "8.3"

