  - name: Import GPG key for RPM 8-3
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2022
    when: 
      - ansible_os_family == "RedHat" 
      - ansible_distribution_major_version | int >= 8
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: Install MySQL RHEL 8 yum repository package
    dnf: name=https://repo.mysql.com/mysql80-community-release-el8.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: Install MySQL RHEL 9 yum repository package
    dnf: name=https://repo.mysql.com/mysql80-community-release-el9.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "9"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: Install MySQL RHEL 10 yum repository package
    dnf: name=https://repo.mysql.com/mysql80-community-release-el10.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: Install MySQL RHEL 9 yum repository package
    dnf: name=https://repo.mysql.com/mysql80-community-release-el9.rpm state=present
    when: 
      - ansible_os_family == "Amazon"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: setup epel 8 repo
    dnf: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm state=present
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: download and extract world database
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql
    when:
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: disable the mysql module on RHEL/CentOS 8
    command: /usr/bin/dnf module disable mysql -y
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: install deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - vim
      - pv
      - unzip
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

