
# MS-INSTALL START

  - name: PRINT VARIABLES
    debug:
      msg: "VER {{ pxb_version_major }} MAJ MIN{{ pxb_version_major_minor }} "
    when: lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: PRINT DEBUG vars ansible_distribution_version
    debug:
      var: ansible_distribution_version

  - name: PRINT DEBUG vars ansible_os_family
    debug:
      var: ansible_os_family

  - name: install yum-utils for rhel
    yum:
      name: yum-utils
      state: present
    when:
      - ansible_os_family == "RedHat"

  # NOTE: use the 2025 key file, NOT the 2023 one. Both files contain the same key
  # (id b7b3b788a8d3785c), but the 2023 copy expired on 2025-10-22 and rhel10's rpm
  # rejects expired keys ("public key is not trusted"). The 2025 file is the same key
  # re-certified until 2029. Importing 2023 first would win: rpm_key matches by key id,
  # so a later 2025 import becomes a no-op.
  - name: Import MySQL GPG key
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2025
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: Import MySQL GPG key (legacy)
    shell: |
      curl -fsSL https://repo.mysql.com/RPM-GPG-KEY-mysql-2023 | apt-key add -
    when:
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80"


