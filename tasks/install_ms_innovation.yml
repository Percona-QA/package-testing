  - name: "[MS-INSTALL] Install MySQL deb packages"
    shell: dpkg -i /tmp/*.deb || apt-get install -f -y
    environment:
      DEBIAN_FRONTEND: noninteractive
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] List installed MySQL packages (DEB)"
    shell: apt list --installed 2>&1 | grep mysql
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
    register: dpkg_list

  - name: "[MS-INSTALL] Debug installed MySQL packages (DEB)"
    debug:
      msg: "Installed MySQL packages are '{{ dpkg_list.stdout }}'"
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Enable mysql-innovation-community repo (RHEL)"
    shell: yum-config-manager --disable mysql80-community && yum-config-manager --enable mysql-innovation-community
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Yum update after repo enable (RHEL)"
    shell: yum update -y
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL community server (RHEL 7)"
    yum:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - libselinux-python
      - pv
      - unzip
      - mysql-community-server-{{ pxb_version_major_minor }}-1.el7
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int <= 7
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] List available MySQL packages (RHEL)"
    shell: yum list available | grep mysql-community-server
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int <= 7
      - lookup('env', 'server_to_test') == "ms_innovation"
    register: yum_list

  - name: "[MS-INSTALL] Debug available MySQL packages (RHEL)"
    debug:
      msg: "Available MySQL packages are '{{ yum_list.stdout }}'"
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL community server (RHEL 8)"
    dnf:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - python3-libselinux
      - mysql-community-server-"{{ pxb_version_major_minor }}".0-1.el8
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[MS-INSTALL] Install MySQL community server (RHEL 9+)"
    dnf:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - python3-libselinux
      - mysql-community-server-"{{ pxb_version_major_minor }}"-1.el9
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 9
      - lookup('env', 'server_to_test') == "ms_innovation"

## INSTALL MS .rpm packages RHEL/OL 8 & 9

  - name: "[MS-INSTALL] Install tar (RHEL)"
    yum:
      name: tar
      state: present
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")

  - name: "[MS-INSTALL] Download MySQL RPM tarball (OL8) "
    command: wget https://downloads.mysql.com/archives/get/p/23/file/mysql-"{{ pxb_version_major_minor }}"-1.el8.x86_64.rpm-bundle.tar 
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: "[MS-INSTALL] Download MySQL RPM tarball (OL9)"
    command: wget https://downloads.mysql.com/archives/get/p/23/file/mysql-"{{ pxb_version_major_minor }}"-1.el9.x86_64.rpm-bundle.tar 
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 9
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: "[MS-INSTALL] List working directory (OL8/OL9)"
    command: ls -l
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms-80"
    register: ls_output

  - name: "[MS-INSTALL] Debug working directory listing"
    debug:
      var: ls_output

  - name: "[MS-INSTALL] Extract MySQL RPM tarball (OL8)"
    command: tar -xvf mysql-"{{ pxb_version_major_minor }}"-1.el8.x86_64.rpm-bundle.tar -C /tmp
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 8
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: "[MS-INSTALL] Extract MySQL RPM tarball (OL9)"
    command: tar -xvf mysql-"{{ pxb_version_major_minor }}"-1.el9.x86_64.rpm-bundle.tar -C /tmp
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_facts['distribution_major_version'] | int >= 9
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: "[MS-INSTALL] Install MySQL RPM packages"
    shell: dnf install -y /tmp/*.rpm
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"
      - ansible_facts['distribution_major_version'] | int in [8, 9]

  - name: "[MS-INSTALL] Import MySQL GPG key 2023"
    ansible.builtin.rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 10
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Download MySQL 8.0 community repo RPM"
    ansible.builtin.get_url:
