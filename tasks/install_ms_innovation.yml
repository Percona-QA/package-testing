  - name: install mysql deb packages
    shell: dpkg -i /tmp/*.deb || apt-get install -f -y
    environment:
      DEBIAN_FRONTEND: noninteractive
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: List the installed mysql packages (DEB)
    shell: apt list --installed 2>&1 | grep mysql
    when:
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
    register: dpkg_list
    failed_when: false

  - name: Debug - Show installed MySQL packages (DEB)
    debug:
      msg: "Installed MySQL packages are '{{ dpkg_list.stdout }}'"
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97" or lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: Enable Innovation LTS repo for RHEL
    shell: yum-config-manager --disable mysql80-community && yum-config-manager --enable mysql-innovation-community
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version >= "7"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: Enable MySQL 9.7 community repo for RHEL (ms-97)
    yum_repository:
      name: mysql-9.7-community
      description: MySQL 9.7 Community Server
      baseurl: "https://repo.mysql.com/yum/mysql-9.7-community/el/{{ ansible_distribution_major_version }}/$basearch/"
      enabled: yes
      gpgcheck: yes
      gpgkey: https://repo.mysql.com/RPM-GPG-KEY-mysql-2025
    when:
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ms-97"

  - name: Disable MySQL 8.0 repo for RHEL (ms-97)
    shell: yum-config-manager --disable mysql80-community
    failed_when: false
    when:
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ms-97"

  - name: YUM UPDATE after RHEL REPO ENABLE
    shell: yum update -y
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: install packages in centos
    yum:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - libselinux-python
      - pv
      - unzip
      - mysql-community-server-{{ pxb_version_major_minor }}-1.el7
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version | int <= 7
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: YUM List available packages
    shell: yum list available | grep mysql-community-server
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version | int <= 7
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"
    register: yum_list

  - name: Debug - Show available MySQL packages in RHEL
    debug:
      msg: "Available MySQL packages are '{{ yum_list.stdout }}'"
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"
      - yum_list is defined and 'stdout' in yum_list

  - name: install packages in rhel/centos 8
    dnf:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - python3-libselinux
      - "mysql-community-server-{{ pxb_version_major_minor }}-1.el8"
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: install packages in rhel/centos 9
    dnf:
      name: "{{ packages }}"
      state: present
      # rhel10 AppStream mariadb11.8 gets pulled into the transaction as a weak dep
      # and file-conflicts with mysql-community packages — keep it out
      install_weak_deps: no
      exclude:
        - "mariadb*"
    vars:
      # Amazon Linux consumes the el9 repo; RHEL/OL/Rocky use their own major version (el9, el10, ...)
      el_suffix: "{{ '9' if ansible_distribution == 'Amazon' else ansible_distribution_major_version }}"
      packages:
      - python3-libselinux
      - "mysql-community-server-{{ pxb_version_major_minor }}-1.el{{ el_suffix }}"
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 9
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

## INSTALL MS .rpm packages RHEL/OL 8 & 9

  - name: install tar on rhel
    yum:
      name: tar
      state: present
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")

  - name: Install mysql RPM packages using tarballs OL8 
    command: wget https://downloads.mysql.com/archives/get/p/23/file/mysql-"{{ pxb_version_major_minor }}"-1.el8.x86_64.rpm-bundle.tar 
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: Install mysql RPM packages using tarballs OL9
    command: wget https://downloads.mysql.com/archives/get/p/23/file/mysql-"{{ pxb_version_major_minor }}"-1.el9.x86_64.rpm-bundle.tar 
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 9
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: List the dirs ol8 and ol9
    command: ls -l
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms-80"
    register: ls_output

  - name: debug List the dirs ol8 and ol9
    debug:
      var: ls_output

  - name: extract mysql RPM packages for OL8
    command: tar -xvf mysql-"{{ pxb_version_major_minor }}"-1.el8.x86_64.rpm-bundle.tar -C /tmp
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: extract mysql RPM packages for OL9
    command: tar -xvf mysql-"{{ pxb_version_major_minor }}"-1.el9.x86_64.rpm-bundle.tar -C /tmp
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 9
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"

  - name: install mysql RPM packages
    shell: dnf install -y /tmp/*.rpm
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"
      - pxb_version_major != "8.3"
      - ansible_distribution_major_version in ["8", "9"]

  - name: Import MySQL GPG key (2023)
    ansible.builtin.rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when: 
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: Download MySQL 8.0 Community repo RPM
    ansible.builtin.get_url:
      url: https://repo.mysql.com/mysql80-community-release-el9-1.noarch.rpm
      dest: /tmp/mysql80-community-release-el9-1.noarch.rpm
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Download MySQL 8.4 Community repo RPM
    ansible.builtin.get_url:
      url: https://repo.mysql.com/mysql84-community-release-el9-1.noarch.rpm
      dest: /tmp/mysql84-community-release-el9-1.noarch.rpm
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: Install MySQL repo RPM
    ansible.builtin.yum:
      name: /tmp/mysql80-community-release-el9-1.noarch.rpm
      state: present
      disable_gpg_check: true
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Install MySQL repo RPM
    ansible.builtin.yum:
      name: /tmp/mysql84-community-release-el9-1.noarch.rpm
      state: present
      disable_gpg_check: true
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: Install MySQL 8.0 Community Server
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
      disable_gpg_check: true
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Install MySQL 8.4 Community Server
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
      disable_gpg_check: true
    when:
      - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: Download MySQL 8.0 Community repo RPM Amazon
    ansible.builtin.get_url:
      url: https://repo.mysql.com/mysql80-community-release-el9-1.noarch.rpm
      dest: /tmp/mysql80-community-release-el9-1.noarch.rpm
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Download MySQL 8.4 Community repo RPM AMzon
    ansible.builtin.get_url:
      url: https://repo.mysql.com/mysql84-community-release-el9-1.noarch.rpm
      dest: /tmp/mysql84-community-release-el9-1.noarch.rpm
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: Import MySQL GPG key (2023)
    ansible.builtin.rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when:
      - ansible_distribution == "Amazon"

  - name: Install MySQL repo RPM Amazon
    ansible.builtin.yum:
      name: /tmp/mysql80-community-release-el9-1.noarch.rpm
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Install MySQL repo RPM Amazon
    ansible.builtin.yum:
      name: /tmp/mysql84-community-release-el9-1.noarch.rpm
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: Install MySQL 8.0 Community Server Amazon
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-80"

  - name: Install MySQL 8.4 Community Server Amazon
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
    when:
      - ansible_distribution == "Amazon"
      - lookup('env', 'server_to_test') == "ms-84"

  - name: start mysql service with ansible module for ms_innovation
    ansible.builtin.systemd:
      name: mysqld
      enabled: yes
      state: started
    become: yes
    when:
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 7
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: start mysql service with systemctl MS80
    ansible.builtin.systemd:
      name: mysqld
      enabled: yes
      state: started
    become: yes
    when: 
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")
      - ansible_distribution_major_version | int >= 7
      - lookup('env', 'server_to_test') == "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: Fetch current MySQL root password from log
    shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}' | tail -1
    register: init_pass
    ignore_errors: yes
    changed_when: false
    when:
      - lookup('env', 'server_to_test') != "ms-80" or lookup('env', 'server_to_test') == "ms-84"

  - name: Set root user password using current password
    shell: |
      mysql -uroot -p'{{ init_pass.stdout }}' --connect-expired-password -e "ALTER USER 'root'@'localhost' IDENTIFIED BY 'U?fY)9s7|3gxUm'; FLUSH PRIVILEGES;"
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"
    ignore_errors: true

  - name: Ensure MySQL service is restarted
    service:
      name: mysqld
      state: restarted
      enabled: yes
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"

  - name: Debug - Show fetched MySQL temporary root password
    debug:
      msg: "Fetched MySQL temporary root password is '{{ init_pass.stdout }}'"
    when: 
      - init_pass.stdout is defined and init_pass.stdout | length > 0
      - lookup('env', 'server_to_test') != "ms-80"
      - lookup('env', 'server_to_test') != "ms-84"

  - name: copy .my.cnf with credentials on centos
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: 
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"

  - name: restart mysql service RHEL
    command: systemctl restart mysqld
    when:
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"
      - (ansible_os_family == "RedHat" or ansible_os_family == "Amazon")

  - name: restart mysql service DEBIAN
    command: systemctl restart mysql
    when:
      - lookup('env', 'server_to_test') == "ms_innovation" or lookup('env', 'server_to_test') == "ms-97"
      - ansible_os_family == "Debian"
