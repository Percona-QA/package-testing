      - lookup('env', 'server_to_test') == "ms-80"

  - name: "[MS-INSTALL] Install MySQL 8.4 community server"
    ansible.builtin.yum:
      name: mysql-community-server
      state: present
    when:
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 10
      - lookup('env', 'server_to_test') == "ms-84"

  - name: "[MS-INSTALL] Download MySQL 8.0 community repo RPM Amazon"
    ansible.builtin.get_url:
