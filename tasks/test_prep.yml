  - name: "[DEBUG] Distribution"
    debug:
      var: ansible_facts['distribution']

  - name: "[DEBUG] Distribution version"
    debug:
      var: ansible_facts['distribution_version']

  - name: "[DEBUG] Distribution major version"
    debug:
      var: ansible_facts['distribution_major_version']

  - name: "[OS-CHECK] Red Hat-based system"
    shell: |
      echo "This is a Red Hat-based system"
    when: ansible_facts['distribution'] == "RedHat"

  - name: "[OS-CHECK] Oracle Linux-based system"
    shell: |
      echo "This is an Oracle Linux-based system"
    when: ansible_facts['distribution'] == "OracleLinux"

  - name: "[OS-CHECK] Other (non-RedHat / non-OracleLinux)"
    shell: |
      echo "This is not a Red Hat-based or Oracle Linux-based system"
    when: ansible_facts['distribution'] != "RedHat" and ansible_facts['distribution'] != "OracleLinux"

  - name: "[CENTOS7] Disable mirrorlist in CentOS repos using sed"
    shell: find /etc/yum.repos.d -name "CentOS-*.repo" -exec sed -i 's/^mirrorlist=/#mirrorlist=/' {} \;
    when:
      - ansible_facts['distribution'] == "CentOS"
      - ansible_facts['distribution_major_version'] | int == 7

  - name: "[CENTOS7] Enable baseurl with vault.centos.org using sed"
    shell: find /etc/yum.repos.d -name "CentOS-*.repo" -exec sed -i 's/^#baseurl=http:\/\/mirror\.centos\.org/baseurl=http:\/\/vault.centos.org/' {} \;
    when:
      - ansible_facts['distribution'] == "CentOS"
      - ansible_facts['distribution_major_version'] | int == 7

  - name: "[PKG-UPDATE] Update all dnf packages without reboot"
    ansible.builtin.dnf: name='*' state=latest
    when: ansible_facts['distribution'] in ['RedHat','OracleLinux']

  - name: "[DEPS] Install wget (yum/RHEL7)"
    yum:
      name: wget
      state: present
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int <= 7

  - name: "[DEPS] Install wget (dnf/RHEL8+)"
    dnf:
      name: wget
      state: present
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: "[EPEL7] Setup EPEL release (CentOS 7 yum)"
    yum: name=https://dl.fedoraproject.org/pub/archive/epel/7/x86_64/Packages/e/epel-release-7-14.noarch.rpm state=present
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int <= 7

  - name: "[GPG] Install EPEL 8 GPG key (non-RHEL)"
    rpm_key:
      state: present
      key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-8
    when:
    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
    - ansible_facts['distribution'] != "RedHat"

  - name: "[GPG] Install Percona repo GPG key"
    rpm_key:
      state: present
      key: https://repo.percona.com/yum/RPM-GPG-KEY-Percona
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version >= "8"

  - name: "[GPG] Install Percona PACKAGING GPG key"
    rpm_key:
      state: present
      key: https://repo.percona.com/yum/PERCONA-PACKAGING-KEY
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version >= "8"

  - name: "[CENTOS8] Update mirrors to vault.centos.org"
    shell: sed -i 's/mirror\.centos\.org/vault\.centos\.org/g;s/\#baseurl=/baseurl=/g;s/mirrorlist=/#mirrorlist=/g' /etc/yum.repos.d/CentOS*.repo
    when: ansible_distribution == "CentOS" and ansible_distribution_major_version == "8"

  - name: "[CENTOS8] Update YUM cache"
    dnf:
      update_cache: yes
      state: present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[GPG] Install EPEL 8 GPG key"
    rpm_key:
      state: present
      key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-8
    when:
    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[EPEL8] Yum update"
    command: dnf update -y
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[EPEL8] Setup epel-release repo"
    dnf: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm state=present
    when: 
    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[GPG] Install EPEL 9 GPG key"
    rpm_key:
      state: present
      key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-9
    when: 
    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "9"

  - name: "[EPEL9] Setup epel-release repo"
    dnf: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm state=present
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int == 9

#  - name: setup epel 9 repo package
#    dnf: name=epel-release state=latest
#    when: 
#    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "9"

  - name: "[GPG] Install EPEL 10 GPG key"
    rpm_key:
      state: present
      key: https://dl.fedoraproject.org/pub/epel/RPM-GPG-KEY-EPEL-10
    when:
    - ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

  - name: "[EPEL10] Yum update"
    command: dnf update -y
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

  - name: "[DEBIAN] Fix Buster EOL repositories"
    shell: sed -i 's|http://deb.debian.org/debian|http://archive.debian.org/debian|g; s|http://cdn-aws.deb.debian.org/debian|http://archive.debian.org/debian|g; s|http://security.debian.org/debian-security|http://archive.debian.org/debian-security|g; /buster-updates/d' /etc/apt/sources.list
    become: yes
    when: ansible_os_family == "Debian" and ansible_distribution_release == "buster"

  - name: "[DEBIAN] Allow release-info change (apt-get update)"
    command: apt-get update -y
    when: ansible_os_family == "Debian" and ansible_distribution_release == "buster"

  - name: "[TEST-DEPS] Install packages via apt (Debian)"
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      packages:
      - unzip
      - wget
      - gnupg
      - rsync
      - jq # for exporter end point metric fetch
      - acl
    retries: 60
    delay: 10
    register: result
    until: result is not failed
    when: ansible_os_family == "Debian"

  - name: "[REPO-CACHE] Clean and update package cache"
    shell: |
      {{ ansible_pkg_mgr }} clean all
      {{ ansible_pkg_mgr }} makecache
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]

  - name: "[TEST-DEPS] Install packages via yum (RHEL7)"
    yum:
      name: "{{ packages }}"
      state: latest
    vars:
      packages:
      - pv
      - libselinux-python
      - unzip
      - wget
      - rsync
      - jq # for exporter end point metric fetch
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version|int <= 7

  - name: "[TEST-DEPS] Install packages via dnf (RHEL8)"
    dnf:
      name: "{{ packages }}"
      state: latest
    vars:
      packages:
      - unzip
      - wget
      - python3
      - jq # for exporter end point metric fetch
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version|int == 8

  - name: "[TEST-DEPS] Install packages via dnf (RHEL9)"
    block:
      - name: "[TEST-DEPS] dnf install (RHEL9)"
        dnf:
          name:
            - unzip
            - wget
            - python3
            - jq # for exporter endpoint metric fetch
          state: latest
        register: dnf_result
        failed_when: dnf_result is failed
        when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 9

    rescue:
      - name: "[TEST-DEPS] Log DNF failure, fallback to yum"
        debug:
          msg: "DNF installation failed. Attempting installation with yum."

  - name: "[TEST-DEPS] Install packages (RHEL10)"
    yum:
      name:
        - unzip
        - wget
        - jq
        - python3
      state: latest
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version|int == 10

  - name: "[PKG-SYNC] Get abs path of package-testing"
    shell: echo '{{ hostvars["localhost"]["playbook_dir"] }}' | grep -oE '^.*package-testing'
    register: pkg_testing_path_output
    when: lookup('env', 'USE_LOCAL_PKG_TEST') == "1"

  - name: "[PKG-SYNC] Set pkg_testing_path fact"
    set_fact:
      pkg_testing_path: "{{ pkg_testing_path_output.stdout }}"
    when: lookup('env', 'USE_LOCAL_PKG_TEST') == "1"

  - name: "[PKG-SYNC] Copy package-testing directory to remote"
    synchronize:
      src: "{{ pkg_testing_path }}"
      dest: /
      recursive: yes
      perms: yes
    when: lookup('env', 'USE_LOCAL_PKG_TEST') == "1"

  - name: "[PKG-SYNC] Download package-testing repo branch"
    command: "{{ item }}"
    with_items:
    - rm -rf /package-testing
    - rm -f master.zip
    - wget --no-check-certificate -O master.zip "https://github.com/{{ git_account }}/package-testing/archive/{{ branch }}.zip"
    - unzip master.zip
    - rm -f master.zip
    - mv "package-testing-{{ branch }}" /package-testing
    vars:
      branch: "{{ lookup('env', 'TESTING_BRANCH') | default('master', true) }}"
      git_account: "{{ lookup('env', 'TESTING_GIT_ACCOUNT') | default('Percona-QA', true) }}"

  - name: "[BATS] Install latest bats from github"
    command: "{{ item }}"
    with_items:
    - rm -f master.zip
    - wget --no-check-certificate -O master.zip https://github.com/sstephenson/bats/archive/master.zip
    - unzip master.zip
    - rm -f master.zip
    - bats-master/install.sh /usr/local
    - rm -rf bats-master

  - name: "[LIST-PKGS] Include tasks for listing installed packages"
    include_tasks: list_installed_packages.yml

  - name: "[SELINUX] Get sestatus"
    command: sestatus
    register: selinux_status
    when: ansible_os_family == "RedHat"

  - name: "[SELINUX] Show sestatus"
    debug:
      var: selinux_status
    when: ansible_os_family == "RedHat"

  - name: "[DNF-MODULE] Get enabled dnf modules (RHEL8)"
    command: dnf module list --enabled
    register: enabled_dnf_modules
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[DNF-MODULE] List enabled dnf modules (RHEL8)"
    debug:
      var: enabled_dnf_modules
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: "[DNF-MODULE] Disable mysql dnf module (RHEL8)"
    shell: dnf module disable mysql -y
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"
