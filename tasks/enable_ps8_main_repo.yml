  - name: include playbook for removing Percona repo
    include_tasks: remove_percona_repository.yml

  - name: Install percona release Debian
    apt:
      deb: https://repo.percona.com/apt/percona-release_latest.generic_all.deb
    when: ansible_os_family == "Debian"

  - name: Install percona release RHEL
    command: rpm -ivh --nodigest --nofiledigest https://repo.percona.com/yum/percona-release-latest.noarch.rpm
    when: ansible_os_family == "RedHat"

  - name: Download Percona GPG key
    ansible.builtin.get_url:
      url: https://github.com/percona/percona-repositories/raw/main/deb/percona-keyring.gpg
      dest: /tmp/percona-keyring.gpg
      mode: '0644'
    when: ansible_os_family == "Debian"

  - name: Install Percona GPG key
    ansible.builtin.copy:
      src: /tmp/percona-keyring.gpg
      dest: /etc/apt/trusted.gpg.d/percona-keyring.gpg
      remote_src: yes
      mode: '0644'
    when: ansible_os_family == "Debian"

  - name: disable the mysql module on RHEL/CentOS 8
    command: /usr/bin/dnf module disable mysql -y
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

