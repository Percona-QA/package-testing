  - name: add eol main repository on debian
    template: src=../templates/eol_deb_repo_file_ps80.j2
              dest=/etc/apt/sources.list.d/post-eol.list
    vars:
      client_id: "{{ lookup('env', 'USERNAME') }}"
      client_token: "{{ lookup('env', 'PASSWORD') }}"
      repo: "main"
    when:
      - ansible_os_family == "Debian"

  - name: add eol main repository on Redhat AMD
    template: src=../templates/eol_rpm_repo_file_ps80.j2
             dest=/etc/yum.repos.d/post-eol.repo
    vars:
      client_id: "{{ lookup('env', 'USERNAME') }}"
      client_token: "{{ lookup('env', 'PASSWORD') }}"
      repo: "release"
    when:
      - ansible_os_family == "RedHat"
      - ansible_architecture == "x86_64"

  - name: add eol testing repository on Redhat ARM
    template: src=../templates/eol_rpm_repo_file_ps80_arm.j2
             dest=/etc/yum.repos.d/post-eol.repo
    vars:
      client_id: "{{ lookup('env', 'USERNAME') }}"
      client_token: "{{ lookup('env', 'PASSWORD') }}"
      repo: "release"
    when:
      - ansible_os_family == "RedHat"
      - ansible_architecture == "aarch64" or ansible_architecture == "arm64"

  - name: Clean and update package cache
    shell: |
      {{ ansible_pkg_mgr }} clean all
      {{ ansible_pkg_mgr }} makecache
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon"]

