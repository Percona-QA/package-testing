# This task installs Percona Server 8.0 on CentOS and Debian/Ubuntu
#

  - name: "[DEBUG-REPOS] Check enabled repos before PS install"
    include_tasks: debug_repos.yml

  - name: "[PS-INSTALL] Download world database"
    command: wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

  - name: "[PS-INSTALL] Install Percona Server deb packages"
    apt:
      name: "{{ packages }}"
      update_cache: yes
      state: latest
    vars:
      packages:
      - percona-server-server
      - percona-server-test
      - percona-server-dbg
      - percona-server-source
      - percona-server-client
      - percona-server-rocksdb
      - percona-mysql-router
      - percona-server-js
    when: ansible_os_family == "Debian"

  - name: "[PS-INSTALL] Get enabled dnf modules (RHEL 8+)"
    command: dnf module list --enabled
    register: enabled_dnf_modules
    when: 
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: "[PS-INSTALL] Debug enabled dnf modules"
    debug:
      var: enabled_dnf_modules
    when: 
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: "[PS-INSTALL] Disable mysql/mariadb dnf modules"
    dnf:
      name: 
        - "@mysql"
        - "@mariadb"
      state: absent
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8
      - ansible_facts['distribution_major_version'] | int != 10

  - name: "[PS-INSTALL] Install Percona Server rpm packages (RHEL 7, yum)"
    yum:
      name: "{{ packages }}"
      state: latest
      disablerepo: "epel"
      update_cache: yes
    vars:
      packages:
      - percona-server-server
      - percona-mysql-router
      - percona-server-client
      - percona-server-test
      - percona-server-debuginfo
      - percona-server-devel
      - percona-server-rocksdb
      - percona-server-js
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int <= 7

  - name: "[PS-INSTALL] Install Percona Server rpm packages (RHEL 8+, dnf)"
    dnf:
      name: "{{ packages }}"
      state: latest
      disablerepo: "epel"
      update_cache: yes
    vars:
      packages:
      - percona-server-server
      - percona-mysql-router
      - percona-server-client
      - percona-server-test
      - percona-server-debuginfo
      - percona-server-devel
      - percona-server-rocksdb
      - percona-server-js
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8
