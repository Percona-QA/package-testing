---
# This playbook does following (major upgrade path):
#   installs PS 8.4 from release repo
#   installs PXB 8.4 from release repo
#   runs some tests / backup
#   removes PXB 8.4
#   enables PS 9.7 release repo, upgrades PS to 9.7
#   enables PXB 9.7 testing repo
#   installs PXB 9.7 (major upgrade)
#   runs post-upgrade tests / backup
#

- hosts: all
  become: true
  become_method: sudo
  vars:
    gnupg_home: /root/.gnupg
    percona_key1: 4D1BB29D63D98E422B2113B19334A25F8507EFA5
    percona_key1_file: "{{ gnupg_home }}/PERCONA-PACKAGING-KEY"
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  tasks:
  - name: include tasks for test env setup
    include_tasks: ../tasks/test_prep.yml

  - name: download and extract world database
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

# ---------- INSTALL PS 8.4 (RELEASE) ----------

  - name: include tasks for enabling PS 8.4 main (release) repo
    include_tasks: ../tasks/enable_ps84_main_repo.yml
    when:
      - lookup('env', 'server_to_test') == "ps-97"

  - name: install Percona Server 8.4 packages
    include_tasks:
      file: ../tasks/install_ps84.yml
      apply:
        environment:
          PERCONA_TELEMETRY_DISABLE: "1"
    when:
      - lookup('env', 'server_to_test') == "ps-97"

  - name: Install percona release if ms-97 is selected
    include_tasks: ../tasks/install_percona-release.yml
    when:
      - lookup('env', 'server_to_test') == "ms-97"

# ---------- INSTALL MS 8.4 (release) ----------

  - name: Extract PXB84 major and minor version number using shell commands
    shell: cat /package-testing/VERSIONS | grep 'PXB84_VER' | cut -d'=' -f2 | sed 's/"//g'
    register: pxb84_version_major_minor_register

  - name: Extract PXB84 major version number using shell commands
    shell: cat /package-testing/VERSIONS | grep PXB84_VER | awk -F'[=".]' '{print $3"."$4}'
    register: pxb84_version_major_register

  - name: Set pxb84_version_major variable
    set_fact:
      pxb84_version_major_reg: "{{ pxb84_version_major_register.stdout }}"

  - name: Set pxb84_version_major_minor variable
    set_fact:
      pxb84_version_major_minor_reg: "{{ pxb84_version_major_minor_register.stdout }}"

  - name: install MYSQL MS Server 8.4 packages
    include_tasks: ../tasks/install_ms_innovation.yml
    vars:
      pxb_version_major: "{{ pxb84_version_major_reg }}"
      pxb_version_major_minor: "{{ pxb84_version_major_minor_reg }}"
    when:
      - lookup('env', 'server_to_test') == "ms-97"

# ---------- INSTALL PXB 8.4 (release) ----------

  - name: Enable PXB 8.4 release repo
    command: percona-release enable pxb-84-lts release

  - name: install Percona XtraBackup 8.4 packages
    include_tasks:
      file: ../tasks/install_pxb84.yml
      apply:
        environment:
          PERCONA_TELEMETRY_DISABLE: "1"

# ---------- START MYSQL, RUN TESTS BEFORE UPGRADE ----------

  - name: Print the version of the installed Percona XtraBackup BEFORE UPGRADE
    shell: |
      {
        echo "XTRABACKUP VERSION is ";
        xtrabackup --version || echo "FAILED: xtrabackup --version";
        echo "xbstream VERSION is ";
        xbstream --version || echo "FAILED: xbstream --version";
        echo "xbcloud VERSION is ";
        xbcloud --version || echo "FAILED: xbcloud --version";
        echo "xbcrypt VERSION is ";
        xbcrypt --version || echo "FAILED: xbcrypt --version";
        echo "list rpm packages ";
        rpm -qa | grep "percona" || echo "FAILED: rpm -qa | grep percona";
        echo "list deb packages";
        dpkg -l | grep "percona" || echo "FAILED: dpkg -l | grep percona";
      }
    register: version_output
    ignore_errors: yes

  - name: Display version information BEFORE UPGRADE
    debug:
      var: version_output.stdout_lines

  - name: check that Percona XtraBackup 8.4 version is correct
    command: /package-testing/version_check.sh pxb84

  - name: start mysql service with systemctl command
    command: systemctl start mysqld
    when: ansible_os_family == "RedHat"

  - name: set root password on centos
    command: /package-testing/setpass_57.sh
    when: ansible_os_family == "RedHat"

  - name: copy .my.cnf with credentials on centos
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: ansible_os_family == "RedHat"

  - name: restart mysql service
    service: name=mysqld state=restarted
    when: ansible_os_family == "RedHat"

  - name: restart mysql service debian
    service: name=mysql state=restarted
    when: ansible_os_family == "Debian"

  - name: install plugins, import world database
    command: /package-testing/plugins_test.sh

  - name: run backup with PXB 8.4
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups_84/

  - name: prepare backup with PXB 8.4
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups_84/

# ---------- MAJOR UPGRADE: REMOVE PXB 8.4, UPGRADE PS TO 9.7, INSTALL PXB 9.7 ----------

  - name: remove PXB 8.4 packages before major upgrade
    include_tasks: ../tasks/remove_pxb84.yml

  - name: disable all percona repos
    command: percona-release disable all

  - name: include tasks for enabling PS 9.7 main (release) repo
    include_tasks: ../tasks/enable_ps97_main_repo.yml
    when:
      - lookup('env', 'server_to_test') == "ps-97"

  - name: install Percona Server 9.7 packages (upgrade PS 8.4 -> 9.7)
    include_tasks:
      file: ../tasks/install_ps97.yml
      apply:
        environment:
          PERCONA_TELEMETRY_DISABLE: "1"
    when:
      - lookup('env', 'server_to_test') == "ps-97"

  - name: Extract PS97 major and minor version number using shell commands
    shell: cat /package-testing/VERSIONS | grep 'PS97_VER' | cut -d'=' -f2 | sed 's/"//g' | cut -d'-' -f1
    register: ps97_version_major_minor_register

  - name: Extract PS97 major version number using shell commands
    shell: cat /package-testing/VERSIONS | grep PS97_VER | awk -F'[=".]' '{print $3"."$4}'
    register: ps97_version_major_register

  - name: Set ps97_version_major variable
    set_fact:
      ps97_version_major_reg: "{{ ps97_version_major_register.stdout }}"

  - name: Set ps97_version_major_minor variable
    set_fact:
      ps97_version_major_minor_reg: "{{ ps97_version_major_minor_register.stdout }}"

  - name: install MYSQL MS Server 9.7 packages (upgrade MS 8.4 -> 9.7)
    include_tasks: ../tasks/install_ms_innovation.yml
    vars:
      pxb_version_major: "{{ ps97_version_major_reg }}"
      pxb_version_major_minor: "{{ ps97_version_major_minor_reg }}"
    when:
      - lookup('env', 'server_to_test') == "ms-97"

# ---------- INSTALL PXB 9.7 FROM TESTING ----------

  - name: Enable PXB 9.7 testing repo
    command: percona-release enable-only pxb-97-lts testing

  - name: install Percona XtraBackup 9.7 packages (major upgrade to 9.7)
    include_tasks:
      file: ../tasks/install_pxb97.yml
      apply:
        environment:
          PERCONA_TELEMETRY_DISABLE: "1"

# ---------- POST-UPGRADE CHECKS ----------

  - name: Print the version of the installed Percona XtraBackup AFTER UPGRADE
    shell: |
      {
        echo "XTRABACKUP VERSION is ";
        xtrabackup --version || echo "FAILED: xtrabackup --version";
        echo "xbstream VERSION is ";
        xbstream --version || echo "FAILED: xbstream --version";
        echo "xbcloud VERSION is ";
        xbcloud --version || echo "FAILED: xbcloud --version";
        echo "xbcrypt VERSION is ";
        xbcrypt --version || echo "FAILED: xbcrypt --version";
        echo "list rpm packages ";
        rpm -qa | grep "percona" || echo "FAILED: rpm -qa | grep percona";
        echo "list deb packages";
        dpkg -l | grep "percona" || echo "FAILED: dpkg -l | grep percona";
      }
    register: version_output
    ignore_errors: yes

  - name: Display version information AFTER UPGRADE
    debug:
      var: version_output.stdout_lines

  - name: start mysql service after PS upgrade RHEL
    command: systemctl start mysqld
    when: ansible_os_family == "RedHat"
    ignore_errors: yes

  - name: start mysql service after PS upgrade Debian
    service: name=mysql state=started
    when: ansible_os_family == "Debian"
    ignore_errors: yes

  - name: check that Percona XtraBackup 9.7 version is correct
    command: /package-testing/version_check.sh pxb97

  - name: check that Percona XtraBackup 9.7 package versions are correct
    command: /package-testing/package_check.sh pxb97

  - name: run backup with PXB 9.7
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups_97/

  - name: prepare backup with PXB 9.7
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups_97/

# ---------- CLEANUP ----------

  - name: remove Percona Server deb packages
    apt:
      name: "{{ packages }}"
      update_cache: no
      state: absent
    vars:
      packages:
      - percona-server-server
      - percona-xtrabackup-97
    when:
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') != "ms-97"

  - name: remove Percona Server rpm packages
    dnf:
      name: "{{ packages }}"
      state: absent
    vars:
      packages:
      - percona-server-server
      - percona-xtrabackup-97
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - lookup('env', 'server_to_test') != "ms-97"
