---
# This playbook sets up the percona repo

# - import_playbook: test_prep.yml

- hosts: all
  become: true
  become_method: sudo

  tasks:

  - name: "[SETUP] Test environment setup"
    include_tasks: ../tasks/test_prep.yml

  - name: "[MS-UPSTREAM] Install yum-utils (RedHat)"
    yum:
      name: yum-utils
      state: present
    when: ansible_facts['os_family'] == "RedHat"

#  - name: Install MySQL apt repository package
#    apt:
#      deb: https://repo.mysql.com/mysql-apt-config_0.8.22-1_all.deb
#    when: ansible_facts['os_family'] == "Debian"

  - name: "[MS-UPSTREAM] Install MySQL repo (RHEL 6)"
    yum: name=https://repo.mysql.com/mysql80-community-release-el6.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 6

  - name: "[MS-UPSTREAM] Install MySQL repo (RHEL 7)"
    yum: name=https://repo.mysql.com//mysql80-community-release-el7.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 7

  - name: "[MS-UPSTREAM] Import GPG key RPM-2023 (RHEL 7+)"
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 7

  - name: "[MS-UPSTREAM] Import GPG key (Debian)"
    ansible.builtin.get_url:
      url: https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
      dest: /etc/apt/trusted.gpg.d/mysql.asc
      mode: '0644'
    when: ansible_facts['os_family'] == "Debian"

  - name: "[MS-UPSTREAM] Import GPG key RPM-2022 (RHEL 8+)"
    rpm_key:
      state: present
      key: https://repo.mysql.com/RPM-GPG-KEY-mysql-2022
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 8

  - name: "[MS-UPSTREAM] Install MySQL repo (RHEL 8)"
    yum: name=https://repo.mysql.com/mysql80-community-release-el8.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 8

  - name: "[MS-UPSTREAM] Install MySQL repo (RHEL 9)"
    yum: name=https://repo.mysql.com/mysql80-community-release-el9.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 9

  - name: "[MS-UPSTREAM] Setup EPEL 7 repo"
    yum: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 7

  - name: "[MS-UPSTREAM] Setup EPEL 8 repo"
    yum: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm state=present
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 8

  - name: "[MS-UPSTREAM] Download world database"
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

  - name: "[MS-UPSTREAM] Disable mysql module (RHEL 8)"
    command: /usr/bin/dnf module disable mysql -y
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 8

  - name: "[MS-UPSTREAM] Install prerequisite deb packages"
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - vim
      - pv
      - unzip
    when: ansible_facts['os_family'] == "Debian"

#  - name: install MySQL Community deb packages
#    apt:
#      name: "{{ packages }}"
#      update_cache: yes
#    vars:
#      packages:
#      - mysql-community-server
#    when: ansible_facts['os_family'] == "Debian"

  - name: "[MS-UPSTREAM] Download MySQL deb tarball (Ubuntu 22.04)"
    command: wget https://cdn.mysql.com/archives/mysql-8.2/mysql-server_8.2.0-1ubuntu22.04_amd64.deb-bundle.tar
    when: ansible_distribution == 'Ubuntu' and ansible_distribution_version == '22.04'

  - name: "[MS-UPSTREAM] Download MySQL deb tarball (Ubuntu 23.04)"
    command: wget https://cdn.mysql.com/archives/mysql-8.2/mysql-server_8.2.0-1ubuntu23.04_amd64.deb-bundle.tar
    when: ansible_distribution == 'Ubuntu' and ansible_distribution_version == '23.04'

  - name: "[MS-UPSTREAM] Download MySQL deb tarball (Debian 11)"
    command: wget https://cdn.mysql.com/archives/mysql-8.2/mysql-server_8.2.0-1debian11_amd64.deb-bundle.tar
    when: ansible_distribution == 'Debian' and ansible_distribution_version == '11'


  - name: "[MS-UPSTREAM] Download MySQL deb tarball (Debian 12)"
    command: wget https://cdn.mysql.com/archives/mysql-8.2/mysql-server_8.2.0-1debian12_amd64.deb-bundle.tar
    when: ansible_distribution == 'Debian' and ansible_distribution_version == '12.0'

  - name: "[MS-UPSTREAM] Extract MySQL deb tarball (Ubuntu 22.04)"
    command: tar -xvf mysql-server_8.2.0-1ubuntu22.04_amd64.deb-bundle.tar -C /tmp
    when: ansible_distribution == 'Ubuntu' and ansible_distribution_version == '22.04'

  - name: "[MS-UPSTREAM] Extract MySQL deb tarball (Ubuntu 23.04)"
    command: tar -xvf mysql-server_8.2.0-1ubuntu23.04_amd64.deb-bundle.tar -C /tmp
    when: ansible_distribution == 'Ubuntu' and ansible_distribution_version == '23.04'

  - name: "[MS-UPSTREAM] Extract MySQL deb tarball (Debian 11)"
    command: tar -xvf mysql-server_8.2.0-1debian11_amd64.deb-bundle.tar -C /tmp
    when: ansible_distribution == 'Debian' and ansible_distribution_version == '11'

  - name: "[MS-UPSTREAM] Extract MySQL deb tarball (Debian 12)"
    command: tar -xvf mysql-server_8.2.0-1debian12_amd64.deb-bundle.tar -C /tmp
    when: ansible_distribution == 'Debian' and ansible_distribution_version == '12.0'

  - name: "[MS-UPSTREAM] Install MySQL deb packages"
    shell: dpkg -i /tmp/*.deb || apt-get install -f -y
    environment:
      DEBIAN_FRONTEND: noninteractive
    when: ansible_facts['os_family'] == "Debian"

  - name: "[MS-UPSTREAM] Enable mysql-innovation-community repo (RHEL)"
    shell: yum-config-manager --disable mysql80-community && yum-config-manager --enable mysql-innovation-community
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int >= 7

  - name: "[MS-UPSTREAM] Install MySQL community server (RHEL 7)"
    yum:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - libselinux-python
      - pv
      - unzip
      - mysql-community-server-8.2.0-1.el7
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int <= 7

  - name: "[MS-UPSTREAM] Install MySQL community server (RHEL 8)"
    package:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - python3-libselinux
      - mysql-community-server-8.2.0-1.el8
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 8

  - name: "[MS-UPSTREAM] Install MySQL community server (RHEL 9)"
    package:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - python3-libselinux
      - mysql-community-server-8.2.0-1.el9
    when: ansible_facts['os_family'] == "RedHat" and ansible_facts['distribution_major_version'] | int == 9

  - name: "[MS-UPSTREAM] Start MySQL service"
    service: name=mysql state=started
    when: ansible_facts['os_family'] == "Debian"

  - name: "[MS-UPSTREAM] Start MySQL service"
    service: name=mysqld state=started
    when: ansible_facts['os_family'] == "RedHat"

  - name: "[MS-UPSTREAM] Set root password (RedHat)"
    command: /package-testing/setpass_57.sh
    when: ansible_facts['os_family'] == "RedHat"

  - name: "[SETUP] Extract major release version"
    shell: cat /package-testing/VERSIONS | grep -oP 'PXB_INN_LTS_MAJ_VER="\K(\d+)\.(\d+)' | tr -d '.'
    register: major_release_version

  - name: "[SETUP] Set major_release_version fact"
    set_fact:
      major_release_version: "{{ major_release_version.stdout }}"

  - name: "[SETUP] Extract PS innovation/LTS repo name"
    shell: grep 'PS_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: ps_inn_lts_repo_name

  - name: "[SETUP] Set ps_inn_lts_repo_name fact"
    set_fact:
      ps_inn_lts_repo_name: "{{ ps_inn_lts_repo_name.stdout }}"

  - name: "[SETUP] Extract PXB innovation/LTS repo name"
    shell: grep 'PXB_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: pxb_inn_lts_repo_name

  - name: "[SETUP] Set pxb_inn_lts_repo_name fact"
    set_fact:
      pxb_inn_lts_repo_name: "{{ pxb_inn_lts_repo_name.stdout }}"

  - name: "[PS-REPO] Enable PS {{ major_release_version }} main repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_main.yml
    when: lookup('env', 'install_repo') == "main"

  - name: "[PS-REPO] Enable PS {{ major_release_version }} testing repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_testing.yml
    when: lookup('env', 'install_repo') == "testing" or lookup('env', 'install_repo') == ""

  - name: "[PS-REPO] Enable PS {{ major_release_version }} experimental repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_experimental.yml
    when: lookup('env', 'install_repo') == "experimental"

  - name: "[DEBUG-REPOS] Verify repos after PS repo enable"
    include_tasks: ../tasks/debug_repos.yml

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} main repo"
    include_tasks: ../tasks/enable_pxb_innovation_main_repo.yml
    when: lookup('env', 'install_repo') == "main"

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} testing repo"
    include_tasks: ../tasks/enable_pxb_innovation_testing_repo.yml
    when: lookup('env', 'install_repo') == "testing" or lookup('env', 'install_repo') == ""

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} experimental repo"
    include_tasks: ../tasks/enable_pxb_innovation_experimental.yml
    when: lookup('env', 'install_repo') == "experimental"

  - name: "[DEBUG-REPOS] Verify repos after PXB repo enable"
    include_tasks: ../tasks/debug_repos.yml

  - name: "[PXB-INSTALL] Install PXB {{ major_release_version }}"
    include_tasks: ../tasks/install_pxb_innovation.yml
    when: lookup('env', 'install_repo') != "experimental"

  - name: "[PXB-TEST] Install plugins and import world database"
    command: /package-testing/plugins_test.sh

  - name: "[PXB-TEST] Check PXB version is correct"
    command: /package-testing/version_check.sh pxb{{ major_release_version }}

  - name: "[PXB-TEST] Check PXB package versions are correct"
    command: /package-testing/package_check.sh pxb{{ major_release_version }}

  - name: "[PXB-TEST] Run backup"
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups/

  - name: "[PXB-TEST] Prepare backup"
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups/
