---
# This playbook does following:
#   enables Percona testing repository
#   installs latest version of PS 8x Innovation-LTS, PT and PXB 8x Innovation-LTS
#   does some tests

- hosts: all
  become: true
  become_method: sudo
  environment:
    chdir: "{{ playbook_dir }}"

  tasks:

  # ── Shared: setup ────────────────────────────────────────────────────────────

  - name: "[SETUP] Echo server_to_test variable"
    debug:
      msg: "{{ lookup('env', 'server_to_test') }}"

  - name: "[SETUP] Test environment setup"
    include_tasks: ../tasks/test_prep.yml

  - name: "[SETUP] Extract PXB major and minor version number"
    shell: cat /package-testing/VERSIONS | grep 'PXB_INN_LTS_MAJ_VER' | cut -d'=' -f2 | sed 's/"//g'
    register: pxb_version_major_minor

  - name: "[SETUP] Extract PXB major version number"
    shell: cat /package-testing/VERSIONS | grep PXB_INN_LTS_MAJ_VER | awk -F'[=".]' '{print $3"."$4}'
    register: pxb_version_major

  - name: "[SETUP] Extract numeric major release version"
    shell: cat /package-testing/VERSIONS | grep -oP 'PXB_INN_LTS_MAJ_VER="\K(\d+)\.(\d+)' | tr -d '.'
    register: major_release_version

  - name: "[SETUP] Set version facts"
    set_fact:
      major_release_version: "{{ major_release_version.stdout }}"
      pxb_version_major: "{{ pxb_version_major.stdout }}"
      pxb_version_major_minor: "{{ pxb_version_major_minor.stdout }}"

  - name: "[SETUP] Print versions"
    debug:
      msg: "PS={{ major_release_version }}  PXB={{ pxb_version_major }}.{{ pxb_version_major_minor }}"

  - name: "[SETUP] Extract PS innovation/LTS repo name"
    shell: grep 'PS_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: ps_inn_lts_repo_name

  - name: "[SETUP] Extract PXB innovation/LTS repo name"
    shell: grep 'PXB_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: pxb_inn_lts_repo_name

  - name: "[SETUP] Set repo name facts"
    set_fact:
      ps_inn_lts_repo_name: "{{ ps_inn_lts_repo_name.stdout }}"
      pxb_inn_lts_repo_name: "{{ pxb_inn_lts_repo_name.stdout }}"

  - name: "[SETUP] Print repo names"
    debug:
      msg: "PS repo={{ ps_inn_lts_repo_name }}  PXB repo={{ pxb_inn_lts_repo_name }}"

  # ── PS innovation: enable repo ───────────────────────────────────────────────

  - name: "[PS-REPO] Enable PS {{ major_release_version }} main repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_main.yml
    when:
      - lookup('env', 'install_repo') == "main"
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-REPO] Enable PS {{ major_release_version }} testing repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_testing.yml
    when:
      - lookup('env', 'install_repo') == "testing" or lookup('env', 'install_repo') == ""
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-REPO] Enable PS {{ major_release_version }} experimental repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_experimental.yml
    when:
      - lookup('env', 'install_repo') == "experimental"
      - lookup('env', 'server_to_test') == "ps_innovation"

  # ── MS innovation: repo setup, install packages, start service ───────────────

  - name: "[MS-INSTALL] Install MS innovation"
    include_tasks: ../tasks/install_ms_innovation.yml
    when: lookup('env', 'server_to_test') == "ms_innovation"

  # ── PS innovation: verify repos then install Percona Server ─────────────────

  - name: "[DEBUG-REPOS] Verify repos after PS repo enable"
    include_tasks: ../tasks/debug_repos.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-INSTALL] Install PS innovation"
    include_tasks: ../tasks/install_ps_innovation.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  # ── Shared: enable PXB repo ─────────────────────────────────────────────────

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} main repo"
    include_tasks: ../tasks/enable_pxb_innovation_main_repo.yml
    when: lookup('env', 'install_repo') == "main"

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} testing repo"
    include_tasks: ../tasks/enable_pxb_innovation_testing_repo.yml
    when: lookup('env', 'install_repo') == "testing" or lookup('env', 'install_repo') == ""

  - name: "[PXB-REPO] Enable PXB {{ major_release_version }} experimental repo"
    include_tasks: ../tasks/enable_pxb_innovation_experimental.yml
    when: lookup('env', 'install_repo') == "experimental"

  # ── Shared: verify repos then install Percona XtraBackup ───────────────────

  - name: "[DEBUG-REPOS] Verify repos after PXB repo enable"
    include_tasks: ../tasks/debug_repos.yml

  - name: "[PXB-INSTALL] Install PXB {{ major_release_version }}"
    include_tasks: ../tasks/install_pxb_innovation.yml

  # ── PS innovation: start service and set root password ───────────────────────

  - name: "[PS-START] Start PS innovation service and set root password"
    include_tasks: ../tasks/start_ps_innovation.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  # ── Shared: PXB smoke tests ──────────────────────────────────────────────────

  - name: "[PXB-TEST] Install plugins and import world database"
    command: /package-testing/plugins_test.sh

  - name: "[PXB-TEST] Check PXB version is correct"
    command: /package-testing/version_check.sh pxb{{ major_release_version }}

  - name: "[PXB-TEST] Check PXB package versions are correct"
    command: /package-testing/package_check.sh pxb{{ major_release_version }}

  - name: "[PXB-TEST] Run backup"
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups/

  - name: "[PXB-TEST] Prepare backup"
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups/

  # ── PS innovation: compression tests (lz4, zstd) ────────────────────────────

  - name: "[PXB-COMPRESSION] Run PXB compression tests"
    include_tasks: ../tasks/test_pxb_compression.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  # ── PS innovation: cleanup ───────────────────────────────────────────────────

  - name: "[PS-CLEANUP] Remove Percona Server deb packages"
    apt:
      name:
        - percona-server-server*
        - percona-xtrabackup-{{ major_release_version }}
      state: absent
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"
      - ansible_os_family == "Debian"

  - name: "[PS-CLEANUP] Remove Percona Server rpm packages"
    yum:
      name:
        - percona-server-server*
        - percona-xtrabackup-{{ major_release_version }}
      state: absent
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"
      - ansible_os_family == "RedHat"

  - name: "[PS-CLEANUP] Check process is stopped after package removal"
    command: /package-testing/check_running.sh mysql stopped
    when: lookup('env', 'server_to_test') == "ps_innovation"
