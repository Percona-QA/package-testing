      - lookup('env', 'server_to_test') == "ps_innovation"

### PS END
  - name: enable Percona XtraBackup {{ major_release_version }} packages 
    include_tasks: ../tasks/enable_pxb_innovation_testing_repo.yml
    when: 
      - lookup('env', 'install_repo') == "testing"
      - lookup('env', 'product_to_test') == "pxb_innovation"

  - name: DEBUG env values
    debug:
      msg:
        - "install_repo={{ lookup('env', 'install_repo') }}"
        - "product_to_test={{ lookup('env', 'product_to_test') }}"
        - "server_to_test={{ lookup('env', 'server_to_test') }}"

  - name: enable Percona XtraBackup {{ major_release_version }} packages 
    include_tasks: ../tasks/enable_pxb_innovation_main_repo.yml
    when: 
      - lookup('env', 'install_repo') == "main"
      - lookup('env', 'product_to_test') == "pxb_innovation"

  - name: install Percona XtraBackup {{ major_release_version }} packages 
    include_tasks: ../tasks/install_pxb_innovation.yml
