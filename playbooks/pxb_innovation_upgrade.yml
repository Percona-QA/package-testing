---
# This playbook does following:
#   sets main Percona repo
#   installs PS innovation lts, PXB innovation lts, PT
#   changes repo to testing
#   upgrades packages to the new version
#   does some tests
#

# Cosmic is still missing python
# - import_playbook: test_prep.yml

- hosts: all
  become: true
  become_method: sudo

  tasks:
  - name: "[SETUP] Test environment setup"
    include_tasks: ../tasks/test_prep.yml

# VARS definition START

  - name: "[SETUP] Extract PXB major and minor version"
    shell: cat /package-testing/VERSIONS | grep 'PXB_INN_LTS_MAJ_VER' | cut -d'=' -f2 | sed 's/"//g'
    register: pxb_version_major_minor

  - name: "[SETUP] Extract PXB major version"
    shell: cat /package-testing/VERSIONS | grep PXB_INN_LTS_MAJ_VER | awk -F'[=".]' '{print $3"."$4}'
    register: pxb_version_major

  - name: "[SETUP] Extract major release version"
    shell: cat /package-testing/VERSIONS | grep -oP 'PXB_INN_LTS_MAJ_VER="\K(\d+)\.(\d+)' | tr -d '.'
    register: major_release_version

  - name: "[SETUP] Set major_release_version fact"
    set_fact:
      major_release_version: "{{ major_release_version.stdout }}"

  - name: "[SETUP] Set pxb_version_major fact"
    set_fact:
      pxb_version_major: "{{ pxb_version_major.stdout }}"

  - name: "[SETUP] Set pxb_version_major_minor fact"
    set_fact:
      pxb_version_major_minor: "{{ pxb_version_major_minor.stdout }}"

  - name: "[SETUP] Extract PS innovation/LTS repo name"
    shell: grep 'PS_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: ps_inn_lts_repo_name

  - name: "[SETUP] Set ps_inn_lts_repo_name fact"
    set_fact:
      ps_inn_lts_repo_name: "{{ ps_inn_lts_repo_name.stdout }}"

  - name: "[SETUP] Extract PXB innovation/LTS repo name"
    shell: grep 'PXB_INN_LTS_REPO=' /package-testing/VERSIONS | cut -d'=' -f2 | tr -d '"'
    register: pxb_inn_lts_repo_name

  - name: "[SETUP] Set pxb_inn_lts_repo_name fact"
    set_fact:
      pxb_inn_lts_repo_name: "{{ pxb_inn_lts_repo_name.stdout }}"

  - name: "[SETUP] Print version and repo vars"
    debug:
      msg: "pxb_version_major_minor: {{ pxb_version_major_minor }} major_release_version: {{ major_release_version }} ps_inn_lts_repo_name:{{ ps_inn_lts_repo_name }} pxb_inn_lts_repo_name:{{ pxb_inn_lts_repo_name }}"

  - name: "[SETUP] Fetch PXB version from testing repo"
    shell: curl -s https://repo.percona.com/pxb-8x-innovation/apt/pool/testing/p/ | grep -oP '"\K[^"]+' | grep percona-xtrabackup | sed -e 's|</a.*||' -e 's/\///g' -e 's/>//g' | grep -v '^$'~ | uniq | sort -t '-' -k 3 -nr | head -n 1 | sed '-e s/percona-xtrabackup-//g' |  sed -E 's/(.)(.)/\1.\2/'
    register: pxb_version_testing

  - name: "[SETUP] Fetch PXB version from main repo"
    shell: curl -s https://repo.percona.com/pxb-8x-innovation/apt/pool/main/p/ | grep -oP '"\K[^"]+' | grep percona-xtrabackup | sed -e 's|</a.*||' -e 's/\///g' -e 's/>//g' | grep -v '^$'~ | uniq | sort -t '-' -k 3 -nr | head -n 1 | sed '-e s/percona-xtrabackup-//g' | sed -E 's/(.)(.)/\1.\2/'
    register: pxb_version_main

  - name: "[SETUP] Set pxb_version_testing fact"
    set_fact:
      pxb_version_testing: "{{ pxb_version_testing.stdout }}"

  - name: "[SETUP] Set pxb_version_main fact"
    set_fact:
      pxb_version_main: "{{ pxb_version_main.stdout }}"

#
  - name: "[SETUP] Fetch PXB version from testing repo (no cs)"
    shell: curl -s https://repo.percona.com/pxb-8x-innovation/apt/pool/testing/p/ | grep -oP '"\K[^"]+' | grep percona-xtrabackup | sed -e 's|</a.*||' -e 's/\///g' -e 's/>//g' | grep -v '^$'~ | uniq | sort -t '-' -k 3 -nr | head -n 1 | sed '-e s/percona-xtrabackup-//g'
    register: pxb_version_testing_no_cs

  - name: "[SETUP] Fetch PXB version from main repo (no cs)"
    shell: curl -s https://repo.percona.com/pxb-8x-innovation/apt/pool/main/p/ | grep -oP '"\K[^"]+' | grep percona-xtrabackup | sed -e 's|</a.*||' -e 's/\///g' -e 's/>//g' | grep -v '^$'~ | uniq | sort -t '-' -k 3 -nr | head -n 1 | sed '-e s/percona-xtrabackup-//g'
    register: pxb_version_main_no_cs

  - name: "[SETUP] Set pxb_version_testing_no_cs fact"
    set_fact:
      pxb_version_testing_no_cs: "{{ pxb_version_testing_no_cs.stdout }}"

  - name: "[SETUP] Set pxb_version_main_no_cs fact"
    set_fact:
      pxb_version_main_no_cs: "{{ pxb_version_main_no_cs.stdout }}"

#
# VARS definition END

  - name: "[PS-INSTALL] Download world database"
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

# PS INSTALL START
  - name: "[PS-REPO] Enable PS main repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_main.yml
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[DEBUG-REPOS] Verify repos after PS main repo enable"
    include_tasks: ../tasks/debug_repos.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-INSTALL] Install Percona Server (main)"
    include_tasks: ../tasks/install_ps_innovation.yml
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"
# PS INSTALL END


# ENABLE PXB MAIN REPO (ps_innovation path)
  - name: "[PXB-REPO] Enable PXB main repo (ps_innovation)"
    include_tasks: ../tasks/enable_pxb_innovation_main_repo.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[DEBUG-REPOS] Verify repos after PXB main repo enable (ps_innovation)"
    include_tasks: ../tasks/debug_repos.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

# INSTALL MS 

  - name: "[MS-INSTALL] Install MySQL MS Server (main)"
    include_tasks: ../tasks/install_ms_innovation.yml
    vars:
      pxb_version_major: "{{ pxb_version_main }}"
      pxb_version_major_minor: "{{ pxb_version_main }}.0"
    when:
      - lookup('env', 'server_to_test') == "ms_innovation"
##
###


# MS END

# ENABLE PXB MAIN REPO

  - name: "[PXB-REPO] Enable PXB main repo (ms_innovation)"
    include_tasks: ../tasks/enable_pxb_innovation_main_repo.yml
    when:
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[DEBUG-REPOS] Verify repos after PXB main repo enable"
    include_tasks: ../tasks/debug_repos.yml

# INSTALL PXB

  - name: "[PXB-INSTALL] Install PXB"
    include_tasks: ../tasks/install_pxb_innovation.yml
    vars:
      major_release_version: "{{ pxb_version_main_no_cs }}"
    when: lookup('env', 'install_repo') != "experimental"


# PXB INSTALL END

  - name: "[PS-START] Start mysql service (RHEL 6)"
    command: service mysql start
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int == 6
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-START] Start mysql service (RHEL 7+)"
    command: systemctl start mysql
    when: 
      - ansible_os_family == "RedHat" and ansible_facts['distribution_major_version'] | int >= 7
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-START] Set root password (RedHat)"
    command: /package-testing/setpass_57.sh
    when: 
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-START] Copy .my.cnf (RedHat)"
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: 
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-START] Restart mysql service"
    service: name=mysql state=restarted
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PXB-TEST] Install plugins and import world database"
    command: /package-testing/plugins_test.sh
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PXB-TEST] Install 3rd party packages (Debian)"
    apt:
      name: "{{ packages }}"
    vars:
      packages:
      - rsyslog-mysql
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PXB-TEST] Install 3rd party packages (RHEL 7, yum)"
    yum:
      name: "{{ packages }}"
    vars:
      packages:
      - rsyslog-mysql
    when: 
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int <= 7
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PXB-TEST] Install 3rd party packages (RHEL 8+, dnf)"
    dnf:
      name: "{{ packages }}"
    vars:
      packages:
      - rsyslog-mysql
    when: 
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8
      - lookup('env', 'server_to_test') == "ps_innovation"


# RUN BACKUPS MAIN REPOS

  - name: "[PXB-TEST] Run backup (main)"
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups/

  - name: "[PXB-TEST] Prepare backup (main)"
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups/

# REMOVE PXB

  - name: "[PXB-UPGRADE] Remove PXB deb packages (main)"
    apt:
      name: "{{ packages }}"
      update_cache: no
      state: absent
    vars:
      packages:
      - percona-xtrabackup-{{ pxb_version_main_no_cs }}*
    when: 
      - ansible_os_family == "Debian"

  - name: "[PXB-UPGRADE] Remove PXB rpm packages (main)"
    yum:
      name: "{{ packages }}"
      state: absent
    vars:
      packages:
      - percona-xtrabackup-{{ pxb_version_main_no_cs }}*
    when: 
      - ansible_os_family == "RedHat"

## REMOVE MS
  - name: "[PXB-UPGRADE] List installed mysql packages (Debian)"
    shell: apt list --installed | grep mysql | awk '{print$1}'
    register: mysql_packages_raw
    when: 
      - ansible_facts['os_family'] == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[PXB-UPGRADE] Set mysql_packages fact"
    set_fact:
      mysql_packages: "{{ mysql_packages_raw.stdout_lines }}"
    when: 
      - ansible_facts['os_family'] == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation"

  - name: "[PXB-UPGRADE] Remove MySQL MS deb packages"
    apt:
      name: "{{ item }}"
      update_cache: no
      state: absent
    loop: "{{ mysql_packages }}"
    when: 
      - ansible_facts['os_family'] == "Debian"
      - lookup('env', 'server_to_test') == "ms_innovation"

# REMOVE old log file PXB

  - name: "[PXB-UPGRADE] Remove PXB backup files"
    command: rm -rf /tmp/backups

# INSTALL MS TESTING REPO VERSION OF PXB

  - name: "[MS-INSTALL] Install MySQL MS Server (testing)"
    include_tasks: ../tasks/install_ms_innovation.yml
    vars:
      pxb_version_major: "{{ pxb_version_testing }}"
      pxb_version_major_minor: "{{ pxb_version_testing }}.0"
    when:
      - lookup('env', 'server_to_test') == "ms_innovation"
##
###

# INSTALL PS START

  - name: "[PS-REPO] Enable PS testing repo"
    include_tasks: ../tasks/enable_ps_innovation_repo_testing.yml
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[DEBUG-REPOS] Verify repos after PS testing repo enable"
    include_tasks: ../tasks/debug_repos.yml
    when: lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-INSTALL] Install Percona Server (testing)"
    include_tasks: ../tasks/install_ps_innovation.yml
    when:
      - lookup('env', 'server_to_test') == "ps_innovation"

# INSTALL PS END


# ENABLE TESTING REPO START PXB
#
  - name: "[PXB-REPO] Enable PXB testing repo"
    include_tasks: ../tasks/enable_pxb_innovation_testing_repo.yml

  - name: "[DEBUG-REPOS] Verify repos after PXB testing repo enable"
    include_tasks: ../tasks/debug_repos.yml

# ENABLE TESTING REPO END

  - name: "[PXB-INSTALL] Install PXB"
    include_tasks: ../tasks/install_pxb_innovation.yml
    vars:
      major_release_version: "{{ pxb_version_testing_no_cs }}"
    when: lookup('env', 'install_repo') != "experimental"

  - name: "[PXB-TEST] Check PXB version is correct"
    command: /package-testing/version_check.sh pxb{{ major_release_version }}

  - name: "[PXB-TEST] Check PXB package versions are correct"
    command: /package-testing/package_check.sh pxb{{ major_release_version }}

# RUN BACKUPS TESTING REPOS

  - name: "[PXB-TEST] Run backup (testing)"
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups/

  - name: "[PXB-TEST] Prepare backup (testing)"
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups/

## REMOVE PS 

  - name: "[PS-CLEANUP] Remove Percona Server deb packages"
    apt:
      name: "{{ packages }}"
      update_cache: no
      state: absent
    vars:
      packages:
      - percona-server-server
      - percona-xtrabackup-8{{ major_release_version }}
    when: 
      - ansible_os_family == "Debian"
      - lookup('env', 'server_to_test') == "ps_innovation"

  - name: "[PS-CLEANUP] Remove Percona Server rpm packages"
    yum:
      name: "{{ packages }}"
      state: absent
    vars:
      packages:
      - percona-server-server
      - percona-xtrabackup-8{{ major_release_version }}
    when: 
      - ansible_os_family == "RedHat"
      - lookup('env', 'server_to_test') == "ps_innovation"



#  - name: check if process is stopped after package removal
#    command: /package-testing/check_running.sh mysql stopped
