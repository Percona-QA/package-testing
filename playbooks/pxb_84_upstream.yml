---
# This playbook sets up the percona repo

# - import_playbook: test_prep.yml

- hosts: all
  become: true
  become_method: sudo
  vars:
    gnupg_home: /root/.gnupg
    percona_key1: 4D1BB29D63D98E422B2113B19334A25F8507EFA5
    percona_key1_file: "{{ gnupg_home }}/PERCONA-PACKAGING-KEY"
    mysql_tarball_version: "8.4.8"
    mysql_tarball_glibc: "glibc2.28"
  tasks:
  - name: include tasks for test env setup
    include_tasks: ../tasks/test_prep.yml

  - name: Decide MySQL install method (tarball on Debian/Ubuntu arm64; apt elsewhere on Debian)
    set_fact:
      mysql_via_tarball: "{{ ansible_os_family == 'Debian' and ansible_architecture in ['aarch64', 'arm64'] }}"

  - name: Install MySQL apt repository package
    apt:
      deb: https://repo.mysql.com/mysql-apt-config_0.8.32-1_all.deb
    when: ansible_os_family == "Debian" and not mysql_via_tarball

  - name: Replace MySQL APT keyring with the newest available signing key
    shell: |
      set -euo pipefail
      KEY_FILE=/tmp/mysql-current.asc
      rm -f "$KEY_FILE"
      FETCHED=""
      for year in 2025 2023 2022; do
        if curl -fsSL "https://repo.mysql.com/RPM-GPG-KEY-mysql-${year}" -o "$KEY_FILE"; then
          FETCHED="$year"
          echo "Fetched RPM-GPG-KEY-mysql-${year}"
          break
        fi
      done
      test -n "$FETCHED" && test -s "$KEY_FILE"
      for target in \
        /usr/share/keyrings/mysql-apt-config.gpg \
        /etc/apt/keyrings/mysql.gpg \
        /etc/apt/trusted.gpg.d/mysql.gpg; do
        if [ -e "$target" ]; then
          gpg --dearmor --yes -o "$target" < "$KEY_FILE"
          chmod 0644 "$target"
        fi
      done
      if [ -f /etc/apt/trusted.gpg ]; then
        apt-key --keyring /etc/apt/trusted.gpg del B7B3B788A8D3785C || true
      fi
      rm -f "$KEY_FILE"
    args:
      executable: /bin/bash
    when: ansible_os_family == "Debian" and not mysql_via_tarball

  - name: Verify MySQL APT repo signature (apt update)
    apt:
      update_cache: yes
    when: ansible_os_family == "Debian" and not mysql_via_tarball

  - name: Install MySQL RHEL 7 yum repository package
    yum: name=https://repo.mysql.com/mysql84-community-release-el7.rpm state=present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "7"

  - name: Write helper script to neutralize MySQL expired GPG key
    copy:
      dest: /tmp/neutralize-mysql-gpg.sh
      mode: "0755"
      content: |
        #!/bin/bash
        set +e
        rpm -qa 'gpg-pubkey-*' | while read -r k; do
          info=$(rpm -qi "$k" 2>/dev/null)
          case "$info" in
            *5072e1f5*) rpm -e "$k" ;;
            *a8d3785c*) rpm -e "$k" ;;
          esac
        done
        rm -f /etc/pki/rpm-gpg/RPM-GPG-KEY-mysql-2022 || true
        for f in /etc/yum.repos.d/mysql-community*.repo; do
          [ -f "$f" ] && sed -i -E 's/^gpgcheck[[:space:]]*=.*/gpgcheck=0/' "$f"
        done
        exit 0
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8

  - name: Run MySQL GPG neutralizer
    command: /bin/bash /tmp/neutralize-mysql-gpg.sh
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8

  - name: Import keys for mysql-repo (only current, non-expired)
    rpm_key:
      state: present
      key: "{{ item }}"
    loop:
      - https://repo.mysql.com/RPM-GPG-KEY-mysql-2023
      - https://repo.mysql.com/RPM-GPG-KEY-mysql-2025
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8

  - name: Install MySQL RHEL 8 yum repository package
    yum: name=https://repo.mysql.com/mysql84-community-release-el8.rpm state=present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: Install MySQL RHEL 9 yum repository package
    yum: name=https://repo.mysql.com/mysql84-community-release-el9-1.noarch.rpm state=present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "9"

  - name: Install MySQL RHEL 10 yum repository package
    dnf:
      name: https://repo.mysql.com/mysql84-community-release-el10-1.noarch.rpm
      state: present
      disable_gpg_check: true
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "10"

  - name: Install MySQL repository package on Amazon Linux 2023 (use el9 build)
    dnf:
      name: https://repo.mysql.com/mysql84-community-release-el9-1.noarch.rpm
      state: present
      disable_gpg_check: true
    when: ansible_distribution == "Amazon" and ansible_distribution_major_version == "2023"

  - name: epel 7 repo
    yum: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-7.noarch.rpm state=present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "7"

  - name: setup epel 8 repo
    yum: name=https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm state=present
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: download and extract world database
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

  - name: disable the mysql module on RHEL/CentOS 8
    command: /usr/bin/dnf module disable mysql -y
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8"

  - name: install MySQL Community deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - mysql-community-server
    when: ansible_os_family == "Debian" and not mysql_via_tarball

  # --- Tarball install path: Debian/Ubuntu arm64 (Oracle ships no arm64 .debs) ---
  - name: install MySQL tarball dependencies (Debian/Ubuntu arm64)
    shell: |
      set -e
      apt-get update -y
      # libaio1 was renamed to libaio1t64 in noble/trixie (time_t transition)
      apt-get install -y libaio1t64 || apt-get install -y libaio1
      apt-get install -y libnuma1 xz-utils curl ca-certificates
      apt-get install -y equivs
      # libtinfo/libncurses: try the t64 variants first, fall back
      apt-get install -y libtinfo6t64 libncurses6t64 \
        || apt-get install -y libtinfo6 libncurses6 \
        || true
      # On noble/trixie, libaio1t64 only provides libaio.so.1t64; MySQL needs libaio.so.1
      for d in /usr/lib/aarch64-linux-gnu /usr/lib64 /usr/lib; do
        if [ -e "$d/libaio.so.1t64" ] && [ ! -e "$d/libaio.so.1" ]; then
          ln -s libaio.so.1t64 "$d/libaio.so.1"
        fi
      done
    args:
      executable: /bin/bash
    when: mysql_via_tarball

  - name: write equivs control file for dummy mysql-client
    copy:
      dest: /tmp/mysql-client.ctl
      mode: "0644"
      content: |
        Section: misc
        Priority: optional
        Standards-Version: 3.9.2
        Package: mysql-client
        Version: 8.4.99-tarball
        Provides: mysql-client, mysql-client-8.4, default-mysql-client, virtual-mysql-client
        Description: Dummy mysql-client satisfied by MySQL tarball install
         Provides the mysql-client package name so other packages can depend on it.
         Real client binaries are installed under /usr/local/mysql/bin.
    when: mysql_via_tarball

  - name: build and install dummy mysql-client deb
    shell: |
      set -e
      cd /tmp
      equivs-build mysql-client.ctl
      dpkg -i mysql-client_8.4.99-tarball_all.deb
    args:
      executable: /bin/bash
      creates: /var/lib/dpkg/info/mysql-client.list
    when: mysql_via_tarball

  - name: create mysql group (tarball)
    group:
      name: mysql
      system: yes
    when: mysql_via_tarball

  - name: create mysql user (tarball)
    user:
      name: mysql
      group: mysql
      system: yes
      shell: /usr/sbin/nologin
      home: /var/lib/mysql
      create_home: no
    when: mysql_via_tarball

  - name: download MySQL Community tarball (arm64)
    get_url:
      url: "https://cdn.mysql.com/archives/mysql-8.4/mysql-{{ mysql_tarball_version }}-linux-{{ mysql_tarball_glibc }}-aarch64.tar.xz"
      dest: "/tmp/mysql-{{ mysql_tarball_version }}-aarch64.tar.xz"
      mode: "0644"
    when: mysql_via_tarball

  - name: extract MySQL tarball to /usr/local
    unarchive:
      src: "/tmp/mysql-{{ mysql_tarball_version }}-aarch64.tar.xz"
      dest: /usr/local
      remote_src: yes
      creates: "/usr/local/mysql-{{ mysql_tarball_version }}-linux-{{ mysql_tarball_glibc }}-aarch64"
    when: mysql_via_tarball

  - name: symlink /usr/local/mysql -> versioned dir
    file:
      src: "/usr/local/mysql-{{ mysql_tarball_version }}-linux-{{ mysql_tarball_glibc }}-aarch64"
      dest: /usr/local/mysql
      state: link
      force: yes
    when: mysql_via_tarball

  - name: create datadir and runtime dirs
    file:
      path: "{{ item }}"
      state: directory
      owner: mysql
      group: mysql
      mode: "0750"
    loop:
      - /var/lib/mysql
      - /var/log/mysql
      - /var/run/mysqld
    when: mysql_via_tarball

  - name: drop minimal /etc/my.cnf
    copy:
      dest: /etc/my.cnf
      mode: "0644"
      content: |
        [mysqld]
        datadir=/var/lib/mysql
        socket=/var/run/mysqld/mysqld.sock
        log-error=/var/log/mysql/error.log
        pid-file=/var/run/mysqld/mysqld.pid
        user=mysql
        [client]
        socket=/var/run/mysqld/mysqld.sock
    when: mysql_via_tarball

  - name: initialize datadir (insecure — sets empty root password)
    command: /usr/local/mysql/bin/mysqld --initialize-insecure --user=mysql --datadir=/var/lib/mysql
    args:
      creates: /var/lib/mysql/mysql
    when: mysql_via_tarball

  - name: install mysql systemd unit
    copy:
      dest: /etc/systemd/system/mysql.service
      mode: "0644"
      content: |
        [Unit]
        Description=MySQL Community Server (tarball)
        After=network.target

        [Service]
        Type=simple
        User=mysql
        Group=mysql
        ExecStart=/usr/local/mysql/bin/mysqld --defaults-file=/etc/my.cnf
        Restart=on-failure
        LimitNOFILE=10000

        [Install]
        WantedBy=multi-user.target
    when: mysql_via_tarball

  - name: symlink mysql client binaries into PATH
    file:
      src: "/usr/local/mysql/bin/{{ item }}"
      dest: "/usr/local/bin/{{ item }}"
      state: link
      force: yes
    loop: [mysql, mysqladmin, mysqld, mysqldump]
    when: mysql_via_tarball

  - name: reload systemd
    systemd:
      daemon_reload: yes
    when: mysql_via_tarball
  # --- end tarball install path ---

  - name: install packages in centos
    yum:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - libselinux-python
      - pv
      - unzip
      - mysql-community-server
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int <= 7

  - name: install packages in rhel/centos 8, 9
    dnf:
      name: "{{ packages }}"
      state: present
      disable_gpg_check: yes
    vars:
      packages:
      - python3-libselinux
      - mysql-community-server
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 8

  - name: Start the MySQL service
    service: name=mysql state=started
    when: ansible_os_family == "Debian"

  - name: Start the MySQL service
    service: name=mysqld state=started
    when: ansible_os_family == "RedHat"

  - name: set root password on centos
    command: /package-testing/setpass_57.sh
    when: ansible_os_family == "RedHat"

  - name: include tasks for enabling tools test repo
    include_tasks: ../tasks/enable_tools_testing_repo.yml

  - name: Enable PXB 84 repo
    command: percona-release enable-only pxb-84-lts testing

  - name: install Percona XtraBackup 8.4 packages
    include_tasks: ../tasks/install_pxb84.yml

  - name: install plugins, import world database
    command: /package-testing/plugins_test.sh

  - name: check that Percona XtraBackup version is correct
    command: /package-testing/version_check.sh pxb84

  - name: check that Percona XtraBackup package versions are correct
    command: /package-testing/package_check.sh pxb84

  - name: run backup
    command: /usr/bin/xtrabackup --backup --user=root --target-dir=/tmp/backups/

  - name: prepare the backup
    command: /usr/bin/xtrabackup --prepare --user=root --target-dir=/tmp/backups/
