---
# This playbook sets up a PXC 9.7 node from Percona repo

- hosts: all
  become: true
  become_method: sudo
  environment:
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  tasks:
  - debug: var=ansible_all_ipv4_addresses
  - set_fact:
      man_ip: "{{ item }}"
    with_items: "{{ ansible_all_ipv4_addresses }}"
    when: "item.startswith('192.168')"
  - debug: var=man_ip

  - name: include tasks for test env setup
    include_tasks: ../tasks/test_prep.yml

  - name: download and extract world database
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

  - name: include tasks for enabling test repo pxc97
    include_tasks: ../tasks/enable_pxc97_testing_repo.yml
    when:
    - lookup('env', 'install_repo') == "testing"

  - name: include tasks for enabling main repo pxc97
    include_tasks: ../tasks/enable_pxc97_main_repo.yml
    when:
    - lookup('env', 'install_repo') == "main" or lookup('env', 'install_repo') == ""

  - name: include tasks for enabling experimental repo pxc97
    include_tasks: ../tasks/enable_pxc97_experimental_repo.yml
    when:
    - lookup('env', 'install_repo') == "experimental"

  - name: add firewall rules
    command: /sbin/iptables -I INPUT -s {{item}} -p tcp -j ACCEPT
    with_items:
    - 192.168.70.63
    - 192.168.70.62
    - 192.168.70.61
    when: ansible_os_family == "RedHat"

  - name: install PXC 9.7 deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - percona-xtradb-cluster-full
      - percona-xtradb-cluster-source
      - percona-toolkit
      - percona-xtrabackup-97
    when: ansible_os_family == "Debian"

  - name: install PXC 9.7 rpm packages
    yum:
      name: "{{ packages }}"
      state: latest
    vars:
      packages:
      - percona-xtradb-cluster-full
      - percona-toolkit
      - percona-xtrabackup-97
    when: ansible_os_family == "RedHat"

  - name: copy PXC config on Redhat
    template: src=../templates/my_rpm_80.j2
              dest=/etc/my.cnf
    when: ansible_os_family == "RedHat"

  - name: copy PXC config on debian/ubuntu
    template: src=../templates/my_8.j2
              dest=/etc/mysql/my.cnf
              mode=0640 owner=mysql group=root
    when: ansible_os_family == "Debian"

  - name: copy .my.cnf with credentials
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: ansible_os_family == "RedHat"

  - name: copy pxc certs
    copy:
      src: ../support-files/certs/
      dest: /etc/mysql/certs/

  - name: start mysql service
    service: name=mysql state=started

  - name: register PXC version Install
    shell: mysqld --version
    register: pxc_version

  - name: print PXC version Install
    debug: var=pxc_version

  - name: check that PXC version is correct Install
    command: /package-testing/version_check.sh pxc97
    when: lookup('env', 'check_version') == "yes" or lookup('env', 'check_version') == ""

  - name: check that PXC package versions are correct Install
    command: /package-testing/package_check.sh pxc97
    when: lookup('env', 'check_version') == "yes" or lookup('env', 'check_version') == ""

  - name: run bats tests for mysql init scripts
    command: /usr/local/bin/bats /package-testing/bats/pxc-init-scripts.bats

  - name: start mysql service
    service: name=mysql state=started
