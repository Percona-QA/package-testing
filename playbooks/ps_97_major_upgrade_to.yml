---
# This playbook:
#   installs Percona Server 8.4 from the configured repo
#   runs some sanity checks
#   disables original repo
#   removes 8.4
#   enables ps-97 repo
#   installs 9.7 and repeats some tests
#   removes packages

- hosts: all
  become: true
  become_method: sudo
  vars:
    major_upgrade: true
    install_mysql_shell: "{{ lookup('env', 'install_mysql_shell', default='') }}"
    gnupg_home: /root/.gnupg
    percona_key1: 4D1BB29D63D98E422B2113B19334A25F8507EFA5
    percona_key1_file: "{{ gnupg_home }}/PERCONA-PACKAGING-KEY"
  environment:
    install_mysql_shell: '{{ install_mysql_shell }}'
    PERCONA_TELEMETRY_URL: "https://check-dev.percona.com/v1/telemetry/GenericReport"

  tasks:
### start of PS 8.4 install
  - name: include tasks for test env setup
    include_tasks: ../tasks/test_prep.yml

  - name: include tasks for local vault setup
    include_tasks: ../tasks/setup_local_vault.yml

  - name: setup config file for keyring vault
    template: src=../scripts/ps_keyring_plugins_test/keyring_vault_test_v2.j2
              dest=/package-testing/scripts/ps_keyring_plugins_test/keyring_vault_test.cnf
              mode=0664 owner=root group=root

  - name: include tasks for enabling PS 8.4 testing repo
    include_tasks: ../tasks/enable_ps84_testing_repo.yml
    when: lookup('env', 'major_upgrade_from_repo') == "testing" or lookup('env', 'major_upgrade_from_repo') == ""

  - name: include tasks for enabling PS 8.4 main repo
    include_tasks: ../tasks/enable_ps84_main_repo.yml
    when: lookup('env', 'major_upgrade_from_repo') == "main"

  - name: include tasks for enabling PS 8.4 experimental repo
    include_tasks: ../tasks/enable_ps84_experimental_repo.yml
    when: lookup('env', 'major_upgrade_from_repo') == "experimental"

  - name: download and extract world database
    command: "{{ item }}"
    with_items:
    - wget --no-check-certificate -P /package-testing https://raw.githubusercontent.com/Percona-QA/percona-qa/master/sample_db/world.sql

  - name: install Percona Server 8.4 packages
    include_tasks: ../tasks/install_ps84.yml

  - name: Enable PXB 84 repo
    command: percona-release enable-only pxb-84-lts testing

  - name: install PXB 8.4 packages
    include_tasks: ../tasks/install_pxb84.yml

  - name: list installed packages
    include_tasks: ../tasks/list_installed_packages.yml

  - name: start mysql service
    service: name=mysql state=started

  - name: set root password on centos
    command: /package-testing/setpass_57.sh
    when: ansible_os_family == "RedHat"

  - name: copy .my.cnf with credentials on centos
    template: src=../templates/my_57.j2
              dest=/root/.my.cnf
              mode=0640 owner=root group=root
    when: ansible_os_family == "RedHat"

  - name: disable selinux on centos7
    shell: setenforce 0 || true
    when: ansible_os_family == "RedHat"

  - name: restart mysql service
    service: name=mysql state=restarted

#  - name: check that Percona Server version is correct
#    command: /package-testing/version_check.sh ps84

#  - name: check that Percona Server package versions are correct
#    command: /package-testing/package_check.sh ps84

#  - name: check that Percona XtraBackup version is correct
#    command: /package-testing/version_check.sh pxb84
#    when: lookup('env', 'major_upgrade_from_repo') != "experimental"

#  - name: check that Percona XtraBackup package versions are correct
#    command: /package-testing/package_check.sh pxb84
#    when: lookup('env', 'major_upgrade_from_repo') != "experimental"

  - name: install 3rd party packages with apt
    apt:
      name: "{{ packages }}"
    vars:
      packages:
      - rsyslog-mysql
    when: ansible_os_family == "Debian"

  - name: install 3rd party packages with dnf
    dnf:
      name: "{{ packages }}"
    vars:
      packages:
      - rsyslog-mysql
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: start mysql service
    service: name=mysql state=started

  - name: disable all percona repos
    command: percona-release disable all

  - name: get my.cnf stats
    stat: path=/etc/my.cnf
    register: mycnf

  - name: copy config file to backup
    copy:
      src: /etc/my.cnf
      dest: /etc/my.cnf.backup
      remote_src: yes
    when: mycnf.stat.exists and ansible_os_family == "RedHat"

### end of PS 8.4 install

  - name: remove PXB 8.4 packages
    include_tasks: ../tasks/remove_pxb84.yml

  - name: include tasks for enabling PS 9.7 main repo
    include_tasks: ../tasks/enable_ps97_main_repo.yml
    when: lookup('env', 'major_upgrade_to_repo') == "main"

  - name: include tasks for enabling PS 9.7 testing repo
    include_tasks: ../tasks/enable_ps97_testing_repo.yml
    when: lookup('env', 'major_upgrade_to_repo') == "testing" or lookup('env', 'major_upgrade_to_repo') == ""

  - name: include tasks for enabling PS 9.7 experimental repo
    include_tasks: ../tasks/enable_ps97_experimental_repo.yml
    when: lookup('env', 'major_upgrade_to_repo') == "experimental"

  - name: append include for RedHat
    lineinfile:
        path: /etc/my.cnf
        line: '!includedir /etc/my.cnf.d'
    when: ansible_os_family == "RedHat"

  - name: install Percona Server 9.7 packages
    include_tasks: ../tasks/install_ps97.yml

  - name: enable the Tools release repo
    command: percona-release enable tools release
    when: ansible_distribution != "Amazon"

  - name: install percona-mysql-shell package
    include_tasks: ../tasks/install_pshell.yml
    when:
      - install_mysql_shell == "yes" or install_mysql_shell == ""
      - ansible_distribution != "Amazon"
      - not (ansible_distribution == "Debian" and ansible_distribution_major_version|int == 11)

  - name: list installed packages
    include_tasks: ../tasks/list_installed_packages.yml

  - name: start mysql service
    service: name=mysql state=started

  - name: check that Percona Server version is correct
    command: /package-testing/version_check.sh ps97

  - name: check that Percona Server package versions are correct
    command: /package-testing/package_check.sh ps97

  - name: run pytest unit tests for ps-admin script
    command: python3 -m pytest -v /package-testing/pytest-tests/test_ps_admin_unit.py

  - name: run pytest integration tests for ps-admin script
    command: python3 -m pytest -v /package-testing/pytest-tests/test_ps_admin_integration.py

  - name: run pytest tests for mysql init scripts
    command: python3 -m pytest -v /package-testing/pytest-tests/test_mysql_init_scripts.py

  - name: remove Percona Server deb packages
    apt:
      name: "{{ packages }}"
      update_cache: no
      state: absent
      dpkg_options: "force-overwrite"
    vars:
      packages:
      - percona-server*
    when: ansible_os_family == "Debian"

  - name: remove Percona Server rpm packages dnf
    dnf:
      name: "{{ packages }}"
      state: absent
    vars:
     packages:
      - percona-server*
    when:
      - ansible_facts['distribution'] in ["RedHat", "CentOS", "OracleLinux", "Amazon", "Rocky"]
      - ansible_facts['distribution_major_version'] | int >= 8

  - name: check if process is stopped after package removal
    command: /package-testing/check_running.sh mysql stopped

  - stat:
      path: /var/lib/mysql
    register: p

  - name: check /var/lib/mysql exists and not empty
    fail:
      msg: "Path exists and is a directory and is not empty"
    when: p.stat.isdir is defined and p.stat.isdir and p.stat.size > 1000000
